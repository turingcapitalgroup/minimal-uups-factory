[profile.default]
src = "src"
out = "out"
libs = ["dependencies"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[soldeer]
remappings_generated = false
remappings_regenerate = false
remappings_version = false

[dependencies]
forge-std = "1.9.7"
